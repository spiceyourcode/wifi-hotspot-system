# /etc/nginx/sites-available/hotspot
# Nginx reverse proxy for the Hotspot API
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/hotspot /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS (enable after certbot setup)
    # return 301 https://$host$request_uri;

    # ── Proxy to Node.js ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Timeouts — STK Push can take up to 30s
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Callback: allow only Safaricom IP ranges ───────────────────
    location /callback/mpesa {
        # Safaricom Daraja IP ranges (update from their docs)
        allow 196.201.214.0/24;
        allow 196.201.213.0/24;
        # Allow during dev (remove in production)
        # allow all;
        deny all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin: restrict to internal / VPN IP only ─────────────────
    location /admin {
        allow 127.0.0.1;
        # allow YOUR.STATIC.VPN.IP;
        deny all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Security headers ───────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Logs
    access_log /var/log/nginx/hotspot-access.log;
    error_log  /var/log/nginx/hotspot-error.log;
}

