<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2; url=$(link-status)">
    <title>Login Successful — WiFi Hotspot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00A651 0%, #007a3d 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: #00A651;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00A651;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">✅</div>
        <h1>Login Successful!</h1>
        <p>Your device is now authorized.</p>
        <div class="loader"></div>
        <p style="font-size: 0.8rem; color: #777;">Redirecting to status page...</p>
    </div>

</body>

</html>
