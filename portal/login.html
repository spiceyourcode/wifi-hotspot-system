<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect to High-Speed WiFi</title>
  <style>
    :root {
      --primary: #00ca4e;
      --secondary: #222;
      --bg: #111;
      --card: #1a1a1a;
      --text: #eee;
    }

    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 10px;
      color: var(--primary);
      text-align: center;
    }

    p {
      color: #888;
      text-align: center;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #aaa;
    }

    input {
      width: 100%;
      padding: 14px;
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
    }

    .pkg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }

    .pkg-card {
      background: #222;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .pkg-card.active {
      border-color: var(--primary);
      background: rgba(0, 202, 78, 0.1);
    }

    .pkg-card h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .pkg-card .price {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary);
      margin: 5px 0;
    }

    .pkg-card .time {
      font-size: 0.8rem;
      color: #777;
    }

    .btn-pay {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: black;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .btn-pay:active {
      transform: scale(0.98);
    }

    .btn-pay:disabled {
      opacity: 0.5;
      background: #666;
      cursor: not-allowed;
    }

    .msg {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.9rem;
      border-left: 4px solid transparent;
    }

    .msg.error {
      background: rgba(255, 59, 48, 0.1);
      color: #ff3b30;
      border-left-color: #ff3b30;
      display: block;
    }

    .msg.success {
      background: rgba(0, 202, 78, 0.1);
      color: var(--primary);
      border-left-color: var(--primary);
      display: block;
    }

    .msg.info {
      background: rgba(10, 132, 255, 0.1);
      color: #0a84ff;
      border-left-color: #0a84ff;
      display: block;
    }

    .terms {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>WiFi Hotspot</h1>
    <p>Premium High-Speed Internet Access</p>

    <div id="statusMsg" class="msg"></div>

    <div id="resumeSection" style="display:none"></div>

    <div class="input-group">
      <label>Enter M-Pesa Number</label>
      <input type="tel" id="placeholder-phone" placeholder="07XXXXXXXX or 01XXXXXXXX" value="0792873281">
    </div>

    <label>Select a Package</label>
    <div class="pkg-grid">
      <div class="pkg-card active" data-key="1hr">
        <h3>Power Hour</h3>
        <div class="price">KES 10</div>
        <div class="time">1 Hour Access</div>
      </div>
      <div class="pkg-card" data-key="3hr">
        <h3>Standard</h3>
        <div class="price">KES 20</div>
        <div class="time">3 Hours Access</div>
      </div>
      <div class="pkg-card" data-key="24hr">
        <h3>Daily</h3>
        <div class="price">KES 50</div>
        <div class="time">Full 24 Hours</div>
      </div>
      <div class="pkg-card" data-key="week">
        <h3>Weekly</h3>
        <div class="price">KES 250</div>
        <div class="time">7 Day Pass</div>
      </div>
    </div>

    <button id="payBtn" class="btn-pay" onclick="handlePay()">PAY VIA M-PESA</button>

    <div style="text-align:center; margin-top:15px;">
      <a href="#" style="color:#777; text-decoration:none; font-size:0.85rem;"
        onclick="handleTrial(); return false;">New? Try 3 mins for Free</a>
    </div>

    <div class="terms">
      By connecting, you agree to our Terms of Service.<br>
      Automated via Lipa Na M-Pesa.
    </div>

    <!-- Hidden MikroTik Login Form -->
    <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
      <input type="hidden" name="username" />
      <input type="hidden" name="password" />
      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />
    </form>
  </div>

  <script>
    // ── Configuration ────────────────────────────────────────────────────────
    const API_BASE = "http://136.113.152.126:3000";
    const CLIENT_IP = "$(ip)";
    const CLIENT_MAC = "$(mac)";

    let selectedPackage = "1hr";
    let pollInterval = null;

    window.onload = () => {
      // Restore phone from storage
      const savedPhone = localStorage.getItem('last_phone');
      if (savedPhone) {
        document.getElementById('placeholder-phone').value = savedPhone;
        checkSessionStatus(savedPhone);
      }

      document.querySelectorAll('.pkg-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          selectedPackage = card.getAttribute('data-key');
        });
      });
    };

    /**
     * Check if this phone has an active session
     */
    async function checkSessionStatus(phone) {
      try {
        const res = await fetch(`${API_BASE}/pay/status/${phone}`);
        const data = await res.json();
        if (data.active) {
          showResumeSection(phone);
        }
      } catch (e) { }
    }

    function showResumeSection(phone) {
      const section = document.getElementById('resumeSection');
      section.innerHTML = `
        <div class="msg info" style="margin-bottom:15px; display:block">
          Welcome back! Active session found for <strong>${phone}</strong>
        </div>
        <button class="btn-pay" style="background:#555; margin-bottom:10px;" onclick="loginToMikrotik('${phone}')">Continue Browsing</button>
        <div style="text-align:center; font-size:0.8rem; color:#777; margin-bottom:15px;">— or pay again below —</div>
      `;
      section.style.display = 'block';
    }

    function showMsg(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = `msg ${type}`;
      el.innerHTML = html;
    }

    function hideMsg() {
      const el = document.getElementById('statusMsg');
      el.className = 'msg';
      el.innerHTML = '';
      el.style.display = 'none';
    }

    /**
     * Activate 3 min trial
     */
    async function handleTrial() {
      const phone = document.getElementById('placeholder-phone').value.trim();
      if (!phone) {
        showMsg('error', 'Enter your phone number first.');
        return;
      }

      showMsg('info', 'Activating your free trial...');

      try {
        const res = await fetch(`${API_BASE}/pay/trial`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, ip: CLIENT_IP, mac: CLIENT_MAC }),
        });
        const data = await res.json();

        if (data.success) {
          showMsg('success', '✅ Trial active! Logging you in...');
          setTimeout(() => { loginToMikrotik(data.username); }, 2000);
        } else {
          showMsg('error', `❌ ${data.message}`);
        }
      } catch (err) {
        showMsg('error', '❌ Could not reach server. Reconnect to WiFi.');
      }
    }

    /**
     * Initiate M-Pesa STK Push
     */
    async function handlePay() {
      hideMsg();
      const phone = document.getElementById('placeholder-phone').value.trim();
      const btn = document.getElementById('payBtn');

      if (!phone || phone.length < 10) {
        showMsg('error', 'Please enter a valid M-Pesa number.');
        return;
      }

      localStorage.setItem('last_phone', phone);
      btn.disabled = true;
      const oldText = btn.textContent;
      btn.textContent = 'Wait for STK Push...';

      try {
        const res = await fetch(`${API_BASE}/pay`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, package: selectedPackage, mac: CLIENT_MAC }),
        });
        const data = await res.json();

        if (data.success) {
          showMsg('info', 'Check your phone and enter M-Pesa PIN.');
          startPolling(phone, btn, oldText);
        } else {
          showMsg('error', `❌ ${data.message}`);
          resetBtn();
        }
      } catch (err) {
        showMsg('error', '❌ Connection error. Try again.');
        resetBtn();
      }
    }

    function startPolling(phone, btn, oldText) {
      let attempts = 0;
      pollInterval = setInterval(async () => {
        attempts++;
        if (attempts > 30) {
          clearInterval(pollInterval);
          showMsg('error', '⏳ Timeout waiting for payment. If you paid, refresh in a minute.');
          resetBtn();
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/pay/status/${phone}`);
          const data = await res.json();
          if (data.active) {
            clearInterval(pollInterval);
            showMsg('success', '✅ Payment confirmed! Taking you online...');
            setTimeout(() => { loginToMikrotik(data.username); }, 1500);
          }
        } catch (e) { }
      }, 3000);
    }

    function resetBtn() {
      const btn = document.getElementById('payBtn');
      btn.disabled = false;
      btn.textContent = 'PAY VIA M-PESA';
    }

    function loginToMikrotik(username) {
      document.sendin.username.value = username;
      document.sendin.password.value = username;
      document.sendin.submit();
    }
  </script>
</body>

</html>
