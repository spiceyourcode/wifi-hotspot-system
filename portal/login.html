<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>WiFi Access — Pay with M-Pesa</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #4CAF50;
      --mpesa: #00A651;
      /* M-Pesa brand green */
      --dark: #1a1a2e;
      --card: #ffffff;
      --muted: #6c757d;
      --danger: #dc3545;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }

    .card-header {
      background: var(--mpesa);
      color: #fff;
      padding: 24px 24px 20px;
      text-align: center;
    }

    .wifi-icon {
      font-size: 2.8rem;
      margin-bottom: 6px;
    }

    .card-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }

    .card-header p {
      font-size: .85rem;
      opacity: .88;
      margin-top: 4px;
    }

    /* Trial badge */
    .trial-badge {
      display: inline-block;
      background: rgba(255, 255, 255, .22);
      border: 1px solid rgba(255, 255, 255, .4);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .78rem;
      margin-top: 10px;
      font-weight: 600;
    }

    /* ── Body ───────────────────────────────────────────────────── */
    .card-body {
      padding: 24px;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color .2s;
      outline: none;
    }

    input[type="tel"]:focus {
      border-color: var(--mpesa);
    }

    /* ── Package grid ───────────────────────────────────────────── */
    .packages {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }

    .pkg-card {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 10px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      user-select: none;
      position: relative;
    }

    .pkg-card:hover {
      border-color: var(--mpesa);
      background: #f0fbf4;
    }

    .pkg-card.active {
      border-color: var(--mpesa);
      background: #e8f5e9;
    }

    .pkg-card .price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--mpesa);
    }

    .pkg-card .duration {
      font-size: .75rem;
      font-weight: 700;
      color: #333;
      margin: 2px 0;
    }

    .pkg-card .speed {
      font-size: .7rem;
      color: var(--muted);
    }

    .pkg-card .badge {
      position: absolute;
      top: -8px;
      right: 8px;
      background: var(--mpesa);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }

    /* ── Pay button ─────────────────────────────────────────────── */
    .btn-pay {
      width: 100%;
      padding: 14px;
      background: var(--mpesa);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }

    .btn-pay:hover {
      background: #007a3d;
    }

    .btn-pay:active {
      transform: scale(.98);
    }

    .btn-pay:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    /* ── Status / messages ──────────────────────────────────────── */
    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: .88rem;
      display: none;
      line-height: 1.5;
    }

    .msg.info {
      background: #e3f2fd;
      color: #0d47a1;
      display: block;
    }

    .msg.success {
      background: #e8f5e9;
      color: #1b5e20;
      display: block;
    }

    .msg.error {
      background: #ffebee;
      color: var(--danger);
      display: block;
    }

    /* ── Polling dots ───────────────────────────────────────────── */
    .dots {
      display: inline-block;
    }

    .dots::after {
      content: '';
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0% {
        content: '.';
      }

      33% {
        content: '..';
      }

      66% {
        content: '...';
      }

      100% {
        content: '';
      }
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    .card-footer {
      padding: 14px 24px 18px;
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      border-top: 1px solid #f0f0f0;
    }

    .card-footer strong {
      color: var(--mpesa);
    }
  </style>
</head>

<body>

  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="wifi-icon">📶</div>
      <h1>Connect to WiFi</h1>
      <p>Fast, reliable internet access</p>
      <div class="trial-badge">✅ 3 min FREE trial — no payment needed</div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <!-- Session Resume -->
      <div id="resumeSection" style="display:none; margin-bottom: 20px;"></div>

      <!-- Phone input -->
      <label for="phone">M-Pesa Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g. 0712 345 678" inputmode="numeric" maxlength="15"
        autocomplete="tel" />

      <!-- Package selection -->
      <label style="margin-top:18px">Choose Package</label>
      <div class="packages" id="packages">
        <div class="pkg-card active" data-key="1hr">
          <div class="price">KES 10</div>
          <div class="duration">1 Hour</div>
          <div class="speed">2 Mbps</div>
        </div>
        <div class="pkg-card" data-key="6hr">
          <div class="price">KES 30</div>
          <div class="duration">6 Hours</div>
          <div class="speed">2 Mbps</div>
        </div>
        <div class="pkg-card" data-key="24hr">
          <div class="price">KES 50</div>
          <div class="duration">24 Hours</div>
          <div class="speed">3 Mbps</div>
          <div class="badge">Popular</div>
        </div>
        <div class="pkg-card" data-key="7day">
          <div class="price">KES 200</div>
          <div class="duration">7 Days</div>
          <div class="speed">4 Mbps</div>
          <div class="badge">Best Value</div>
        </div>
      </div>

      <!-- Pay button -->
      <button class="btn-pay" id="payBtn" onclick="handlePay()">
        Pay with M-Pesa
      </button>

      <!-- Free Trial button -->
      <button class="btn-pay" id="trialBtn" onclick="handleTrial()" style="background:#444; margin-top:10px;">
        Activate Free Trial (3 min)
      </button>

      <!-- Status messages -->
      <div class="msg" id="statusMsg"></div>

    </div>

    <!-- Hidden MikroTik Login Form -->
    <form id="mikrotikForm" action="http://192.168.88.1/login" method="post" style="display:none">
      <input type="hidden" name="username" id="hs_user">
      <input type="hidden" name="password" id="hs_pass">
      <input type="hidden" name="dst" value="http://192.168.88.1/">
    </form>

    <!-- Footer -->
    <div class="card-footer">
      Powered by <strong>M-Pesa</strong> &nbsp;|&nbsp; Secure &amp; Instant
    </div>
  </div>

  <script>
    // ── Configuration ────────────────────────────────────────────────────────
    // Replace this with your laptop's actual LAN IP:
    const API_BASE = "http://192.168.88.254:3000";

    /**
     * Automatically log into MikroTik after provisioning
     */
    function loginToMikrotik(username) {
      if (!username) return;
      // Save for next time
      localStorage.setItem('hotspot_phone', username);

      document.getElementById('hs_user').value = username;
      document.getElementById('hs_pass').value = username;
      document.getElementById('mikrotikForm').submit();
    }

    // ── State ────────────────────────────────────────────────────────────────
    let selectedPackage = '1hr';
    let pollInterval = null;

    // ── Initial Load ─────────────────────────────────────────────────────────
    window.onload = () => {
      const savedPhone = localStorage.getItem('hotspot_phone');
      if (savedPhone) {
        document.getElementById('phone').value = savedPhone;
        checkSessionStatus(savedPhone);
      }

      // Package click listeners
      document.querySelectorAll('.pkg-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          selectedPackage = card.getAttribute('data-key');
        });
      });
    };

    /**
     * Check if this phone has an active paid session
     */
    async function checkSessionStatus(phone) {
      try {
        const res = await fetch(`${API_BASE}/admin/status/${phone}`, {
          headers: { 'Authorization': 'Bearer hotspot-admin-secret-2024' }
        });
        const data = await res.json();
        if (data.active) {
          showResumeSection(phone);
        }
      } catch (e) { }
    }

    function showResumeSection(phone) {
      const section = document.getElementById('resumeSection');
      section.innerHTML = `
        <div class="msg info" style="margin-bottom:15px; display:block">
          Welcome back! You have an active session for <strong>${phone}</strong>
        </div>
        <button class="btn-pay" style="background:#555; margin-bottom:10px;" onclick="loginToMikrotik('${phone}')">Continue Browsing</button>
        <div style="text-align:center; font-size:0.8rem; color:#777; margin-bottom:15px;">— or use a different number below —</div>
      `;
      section.style.display = 'block';
    }

    // ── Show status message ──────────────────────────────────────────────────
    function showMsg(type, html) {
      const el = document.getElementById('statusMsg');
      el.className = `msg ${type}`;
      el.innerHTML = html;
    }

    function hideMsg() {
      const el = document.getElementById('statusMsg');
      el.className = 'msg';
      el.innerHTML = '';
    }

    // ── Free Trial ───────────────────────────────────────────────────────────
    async function handleTrial() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) {
        showMsg('error', '⚠️ Please enter your phone number first to activate the trial.');
        return;
      }

      const btn = document.getElementById('trialBtn');
      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Activating...';

      try {
        const res = await fetch(`${API_BASE}/pay/trial`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone }),
        });
        const data = await res.json();

        if (data.success) {
          showMsg('success', `✅ ${data.message} Logging you in...`);
          // Fixed: Use normalized username from server
          setTimeout(() => { loginToMikrotik(data.username); }, 2000);
        } else {
          showMsg('error', `❌ ${data.message}`);
          btn.disabled = false;
          btn.textContent = oldText;
        }
      } catch (err) {
        showMsg('error', '❌ Could not reach the server. Make sure you are connected to the WiFi.');
        btn.disabled = false;
        btn.textContent = oldText;
      }
    }

    // ── Initiate payment ─────────────────────────────────────────────────────
    async function handlePay() {
      hideMsg();
      const phone = document.getElementById('phone').value.trim();
      const btn = document.getElementById('payBtn');

      if (!phone) {
        showMsg('error', '⚠️ Please enter your M-Pesa phone number.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending prompt…';

      try {
        const res = await fetch(`${API_BASE}/pay`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, package: selectedPackage }),
        });
        const data = await res.json();

        if (!data.success) {
          showMsg('error', `❌ ${data.message}`);
          btn.disabled = false;
          btn.textContent = 'Pay with M-Pesa';
          return;
        }

        // Success — show waiting UI and start polling
        showMsg('info',
          `📱 <strong>M-Pesa prompt sent to ${phone}</strong><br>
        Enter your PIN on your phone<span class="dots"></span><br>
        <small>KES ${data.amount} for ${data.package}</small>`
        );
        btn.textContent = 'Waiting for payment…';
        startPolling(data.checkoutRequestId, phone);

      } catch (err) {
        showMsg('error', '❌ Network error. Please check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Pay with M-Pesa';
      }
    }

    // ── Poll payment status ──────────────────────────────────────────────────
    function startPolling(checkoutRequestId, phone) {
      let attempts = 0;
      const MAX_ATTEMPTS = 30;

      pollInterval = setInterval(async () => {
        attempts++;
        if (attempts > MAX_ATTEMPTS) {
          clearInterval(pollInterval);
          showMsg('error', '⏳ Timeout. Check your connection or try again.');
          resetBtn();
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/pay/status/${checkoutRequestId}`);
          const data = await res.json();

          if (data.status === 'completed') {
            clearInterval(pollInterval);
            showMsg('success', '✅ <strong>Payment confirmed!</strong> Logging you in...');
            // Fixed: Use normalized username from server
            setTimeout(() => { loginToMikrotik(data.username); }, 2000);

          } else if (data.status === 'failed') {
            clearInterval(pollInterval);
            showMsg('error', '❌ Payment failed. Please try again.');
            resetBtn();
          }
        } catch (_) { }
      }, 3000);
    }

    function resetBtn() {
      const btn = document.getElementById('payBtn');
      btn.disabled = false;
      btn.textContent = 'Pay with M-Pesa';
    }
  </script>

</body>

</html>
